<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工具箱 · ToolsHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c10; --bg2: #0d1319; --bg3: #111922; --bg4: #16202e;
  --border: #1e2d3d; --text: #e8edf2; --text2: #8a9bb0; --text3: #4a5a6e;
  --accent: #00e5a0; --accent2: #00b8ff; --accent3: #ff6b35; --accent4: #a78bfa;
  --radius: 12px; --radius2: 20px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Glowing grid bg */
body::after {
  content: ''; position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,160,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,160,0.04) 1px, transparent 1px);
  background-size: 60px 60px; pointer-events: none; z-index: 0;
}

header {
  position: relative; z-index: 10;
  padding: 56px 40px 44px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(0,229,160,0.05) 0%, transparent 100%);
}
.logo-bar {
  display: flex; align-items: center; gap: 10px;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  letter-spacing: 3px; text-transform: uppercase; color: var(--accent);
  margin-bottom: 16px;
}
.logo-bar::before {
  content: ''; width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); display: inline-block;
  box-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

h1 { font-size: clamp(32px,5vw,58px); font-weight:800; letter-spacing:-2px; line-height:1.1; margin-bottom:12px; }
.gradient-text {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header-desc { font-size:14px; color:var(--text2); max-width:520px; line-height:1.7; }

.stats { display:flex; gap:28px; margin-top:24px; }
.stat { display:flex; flex-direction:column; }
.stat .num { font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700; color:var(--accent); }
.stat .lbl { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }

.search-wrap {
  position: relative; z-index: 10; padding: 18px 40px 0;
}
.search-box {
  display:flex; align-items:center; gap:10px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius:999px; padding: 11px 18px; max-width:380px;
  transition: border-color .2s, box-shadow .2s;
}
.search-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,160,0.08); }
.search-box svg { color:var(--text3); flex-shrink:0; }
.search-input {
  background:none; border:none; outline:none;
  font-family:'Sora',sans-serif; font-size:13px; color:var(--text); width:100%;
}
.search-input::placeholder { color:var(--text3); }

.nav-filter {
  position: relative; z-index: 10; padding: 16px 40px;
  display:flex; gap:8px; flex-wrap:wrap; border-bottom:1px solid var(--border); background:var(--bg2);
}
.fbtn {
  font-family:'Sora',sans-serif; font-size:13px; padding:6px 16px;
  border-radius:999px; border:1px solid var(--border); background:transparent;
  color:var(--text2); cursor:pointer; transition:all .2s; letter-spacing:.3px;
}
.fbtn:hover { border-color:var(--accent); color:var(--accent); background:rgba(0,229,160,0.06); }
.fbtn.active { border-color:var(--accent); color:var(--accent); background:rgba(0,229,160,0.1); box-shadow:0 0 14px rgba(0,229,160,0.12); }

main { position:relative; z-index:10; padding:36px 40px; max-width:1400px; margin:0 auto; }

.tools-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:14px; }

.tool-card {
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius2);
  padding:22px; cursor:pointer; transition:all .3s cubic-bezier(.34,1.56,.64,1);
  opacity:0; transform:translateY(18px);
  animation: cardIn .45s forwards;
}
.tool-card:nth-child(1){animation-delay:.04s} .tool-card:nth-child(2){animation-delay:.08s}
.tool-card:nth-child(3){animation-delay:.12s} .tool-card:nth-child(4){animation-delay:.16s}
.tool-card:nth-child(5){animation-delay:.20s} .tool-card:nth-child(6){animation-delay:.24s}
.tool-card:nth-child(7){animation-delay:.28s} .tool-card:nth-child(8){animation-delay:.32s}
.tool-card:nth-child(9){animation-delay:.36s} .tool-card:nth-child(10){animation-delay:.40s}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}
.tool-card:hover{
  border-color:rgba(0,229,160,.3); transform:translateY(-5px);
  box-shadow:0 16px 48px rgba(0,229,160,.07),0 4px 16px rgba(0,0,0,.4);
}
.tool-card.hidden{display:none}

.tool-icon {
  width:50px; height:50px; border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-size:24px; margin-bottom:14px; position:relative;
}

.tool-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; }
.tool-cat {
  font-size:11px; padding:3px 10px; border-radius:999px; font-weight:600;
  text-transform:uppercase; letter-spacing:.5px;
}

.tool-nm { font-size:16px; font-weight:700; margin-bottom:6px; letter-spacing:-.3px; }
.tool-desc { font-size:12.5px; color:var(--text2); line-height:1.65; margin-bottom:16px; }
.tool-footer { display:flex; align-items:center; justify-content:space-between; padding-top:14px; border-top:1px solid var(--border); }
.tool-tags { display:flex; gap:6px; }
.tool-tag { font-size:10px; padding:2px 8px; border-radius:999px; color:var(--text3); border:1px solid var(--border); font-family:'JetBrains Mono',monospace; }
.open-btn {
  font-family:'Sora',sans-serif; font-size:12px; font-weight:600;
  padding:6px 14px; border-radius:999px;
  background:rgba(0,229,160,.1); border:1px solid rgba(0,229,160,.3);
  color:var(--accent); cursor:pointer; transition:all .2s;
}
.open-btn:hover { background:var(--accent); color:var(--bg); box-shadow:0 0 16px rgba(0,229,160,.25); }

.empty-state { text-align:center; padding:80px 20px; color:var(--text3); font-size:14px; display:none; }
.empty-state.visible{display:block}

footer { position:relative; z-index:10; text-align:center; padding:36px; color:var(--text3); font-size:11px; border-top:1px solid var(--border); font-family:'JetBrains Mono',monospace; letter-spacing:1px; }

/* ── TOOL PANEL (expanded inline) ── */
.tool-panel {
  background:var(--bg2); border:1px solid rgba(0,229,160,.25);
  border-radius:var(--radius2); padding:28px; margin-top:14px;
  display:none; animation: panelIn .3s ease;
}
.tool-panel.open{display:block}
@keyframes panelIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

.panel-title { font-size:20px; font-weight:700; margin-bottom:6px; }
.panel-sub { font-size:12px; color:var(--text3); margin-bottom:20px; font-family:'JetBrains Mono',monospace; }

/* Tool-specific styles */
.t-input-group { display:flex; gap:8px; margin-bottom:12px; }
.t-input {
  flex:1; padding:10px 14px; border-radius:var(--radius);
  border:1px solid var(--border); background:var(--bg3);
  color:var(--text); font-family:'Sora',sans-serif; font-size:13px;
  outline:none; transition:border-color .2s;
}
.t-input:focus { border-color:var(--accent); }
.t-btn {
  padding:10px 20px; border-radius:var(--radius);
  border:1px solid rgba(0,229,160,.3); background:rgba(0,229,160,.1);
  color:var(--accent); font-family:'Sora',sans-serif; font-size:13px;
  font-weight:600; cursor:pointer; transition:all .2s; white-space:nowrap;
}
.t-btn:hover { background:var(--accent); color:var(--bg); }
.t-result {
  background:var(--bg3); border:1px solid var(--border);
  border-radius:var(--radius); padding:14px 16px; min-height:48px;
  font-family:'JetBrains Mono',monospace; font-size:13px;
  color:var(--accent); word-break:break-all; display:flex; align-items:center;
  justify-content:space-between; gap:10px;
}
.t-result-label { font-size:11px; color:var(--text3); font-family:'Sora',sans-serif; }
.copy-btn {
  padding:4px 10px; border-radius:6px; border:1px solid var(--border);
  background:var(--bg4); color:var(--text2); font-size:11px; cursor:pointer;
  transition:all .2s; flex-shrink:0;
}
.copy-btn:hover { border-color:var(--accent); color:var(--accent); }

textarea.t-area {
  width:100%; padding:14px; border-radius:var(--radius);
  border:1px solid var(--border); background:var(--bg3);
  color:var(--text); font-family:'JetBrains Mono',monospace; font-size:12.5px;
  outline:none; resize:vertical; min-height:80px; transition:border-color .2s;
}
textarea.t-area:focus{border-color:var(--accent)}
.t-labels { display:flex; gap:8px; margin-bottom:8px; }
.t-label { font-size:12px; color:var(--text2); }
.t-output { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); padding:14px; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--accent); white-space:pre-wrap; min-height:60px; margin-bottom:10px; }

/* slider */
.t-slider { width:100%; accent-color:var(--accent); margin:8px 0; }
.t-slider-val { font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--accent); }

/* Color swatch */
.color-preview { width:100%; height:60px; border-radius:var(--radius); margin-bottom:8px; border:1px solid var(--border); }
.t-col-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.t-col-swatch {
  display:flex; align-items:center; gap:8px;
  background:var(--bg3); border:1px solid var(--border);
  border-radius:8px; padding:8px 12px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text2);
}
.swatch-dot { width:16px; height:16px; border-radius:4px; flex-shrink:0; }

/* UUID list */
.uuid-list { display:flex; flex-direction:column; gap:6px; max-height:200px; overflow-y:auto; }
.uuid-item { display:flex; align-items:center; justify-content:space-between; background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:8px 12px; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text2); }

/* BMI gauge */
.bmi-bar-wrap { position:relative; height:12px; border-radius:6px; overflow:hidden; margin:12px 0 8px; display:flex; }
.bmi-seg { flex:1; }
.bmi-label { display:flex; justify-content:space-between; font-size:11px; color:var(--text3); margin-bottom:6px; }

/* Json formatter */
.json-tabs { display:flex; gap:6px; margin-bottom:8px; }
.json-tab { font-size:12px; padding:5px 12px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--text2); cursor:pointer; font-family:'Sora',sans-serif; transition:all .2s; }
.json-tab.active { border-color:var(--accent); color:var(--accent); background:rgba(0,229,160,.1); }
.json-error { color:#ff6b6b; font-size:12px; font-family:'JetBrains Mono',monospace; padding:10px; background:rgba(255,107,107,.1); border:1px solid rgba(255,107,107,.3); border-radius:8px; }

/* Timer */
.timer-display { font-family:'JetBrains Mono',monospace; font-size:48px; font-weight:700; text-align:center; color:var(--accent); letter-spacing:4px; padding:20px; }
.timer-controls { display:flex; gap:10px; justify-content:center; margin-bottom:16px; }
.timer-btn { padding:10px 28px; border-radius:999px; border:1px solid rgba(0,229,160,.3); background:rgba(0,229,160,.1); color:var(--accent); font-family:'Sora',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:all .2s; }
.timer-btn:hover { background:var(--accent); color:var(--bg); }
.timer-btn.stop { border-color:rgba(255,107,53,.4); color:var(--accent3); background:rgba(255,107,53,.1); }
.timer-btn.stop:hover { background:var(--accent3); color:var(--bg); }
.timer-presets { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
.timer-preset { padding:5px 14px; border-radius:999px; border:1px solid var(--border); font-size:12px; color:var(--text2); cursor:pointer; font-family:'JetBrains Mono',monospace; transition:all .2s; }
.timer-preset:hover { border-color:var(--accent2); color:var(--accent2); }

/* Hash display */
.hash-result { display:flex; flex-direction:column; gap:6px; }
.hash-row { display:flex; align-items:center; gap:8px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:8px 12px; }
.hash-row .hash-label { font-size:11px; color:var(--text3); width:50px; flex-shrink:0; font-family:'JetBrains Mono',monospace; }
.hash-row .hash-val { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--accent); word-break:break-all; }

/* Word/char counter */
.counter-display { display:flex; gap:12px; flex-wrap:wrap; }
.counter-item { background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:10px 16px; text-align:center; min-width:70px; }
.counter-item .ci-num { font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700; color:var(--accent); }
.counter-item .ci-lbl { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; margin-top:2px; }

/* Unit converter */
.unit-cats { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
.unit-cat { font-size:12px; padding:5px 12px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--text2); cursor:pointer; font-family:'Sora',sans-serif; transition:all .2s; }
.unit-cat.active { border-color:var(--accent); color:var(--accent); background:rgba(0,229,160,.1); }
.unit-row { display:grid; grid-template-columns:1fr auto 1fr; gap:8px; align-items:center; }
.unit-arrow { color:var(--text3); font-size:16px; }

/* Close panel */
.panel-close { display:flex; justify-content:flex-end; margin-bottom:12px; }
.panel-close-btn { padding:4px 12px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--text3); font-size:12px; cursor:pointer; transition:all .2s; }
.panel-close-btn:hover { border-color:var(--accent3); color:var(--accent3); }

@media(max-width:640px){
  header{padding:32px 20px 28px}
  main{padding:20px}
  .nav-filter{padding:14px 20px}
  .search-wrap{padding:14px 20px 0}
  .stats{gap:16px}
  .tools-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <div class="logo-bar">TOOLS HUB · 原创工具站</div>
  <h1>我写的<span class="gradient-text">10个小工具</span><br>免费使用</h1>
  <p class="header-desc">所有工具均为本人原创开发，纯浏览器端运行，无需联网，无需安装，直接打开即可使用，数据不会上传到任何服务器。</p>
  <div class="stats">
    <div class="stat"><div class="num">10</div><div class="lbl">原创工具</div></div>
    <div class="stat"><div class="num">100%</div><div class="lbl">本地运行</div></div>
    <div class="stat"><div class="num">隐私安全</div><div class="lbl">数据不上传</div></div>
  </div>
</header>

<div class="search-wrap">
  <div class="search-box">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" id="searchInput" placeholder="搜索工具...">
  </div>
</div>

<nav class="nav-filter">
  <button class="fbtn active" data-f="all">全部</button>
  <button class="fbtn" data-f="dev">开发</button>
  <button class="fbtn" data-f="util">效率</button>
  <button class="fbtn" data-f="media">转换</button>
  <button class="fbtn" data-f="fun">趣味</button>
</nav>

<main>
  <div class="tools-grid" id="toolsGrid"></div>
  <div class="empty-state" id="emptyState">没有找到匹配的工具</div>
</main>

<footer>TOOLS HUB · 原创工具 · 持续更新中</footer>

<script>
// ─────────────────────────────────────────
//  工具数据
// ─────────────────────────────────────────
const tools = [
  {
    id: 1, name: "密码生成器", icon: "🔑", iconBg: "linear-gradient(135deg,#00e5a0,#00b894)",
    cat:"util", catLabel:"效率", catColor:"var(--accent)",
    desc: "随机生成强密码，支持自定义长度、是否包含特殊字符，可一键复制。纯本地生成，安全无忧。",
    content: `
      <div class="t-slider-row" style="margin-bottom:14px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
          <span class="t-label">密码长度：</span>
          <input type="range" class="t-slider" id="pwLen" min="6" max="64" value="16">
          <span class="t-slider-val" id="pwLenVal">16</span>
        </div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);cursor:pointer;">
            <input type="checkbox" id="pwUpper" checked style="accent-color:var(--accent)"> 大写字母
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);cursor:pointer;">
            <input type="checkbox" id="pwLower" checked style="accent-color:var(--accent)"> 小写字母
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);cursor:pointer;">
            <input type="checkbox" id="pwNum" checked style="accent-color:var(--accent)"> 数字
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);cursor:pointer;">
            <input type="checkbox" id="pwSym" checked style="accent-color:var(--accent)"> 特殊符号
          </label>
        </div>
      </div>
      <div class="t-result">
        <span class="t-result-label" id="pwOutput">点击生成</span>
        <button class="copy-btn" onclick="copyText(document.getElementById('pwOutput').textContent)">复制</button>
      </div>
      <button class="t-btn" onclick="genPwd()" style="margin-top:10px;width:100%;justify-content:center;">🎲 生成密码</button>
      <div id="pwStr" style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;"></div>
      <script>
        document.getElementById('pwLen').oninput = () => document.getElementById('pwLenVal').textContent = document.getElementById('pwLen').value;
        function genPwd(){
          const len=+document.getElementById('pwLen').value;
          let c='';
          if(document.getElementById('pwUpper').checked) c+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
          if(document.getElementById('pwLower').checked) c+='abcdefghijklmnopqrstuvwxyz';
          if(document.getElementById('pwNum').checked) c+='0123456789';
          if(document.getElementById('pwSym').checked) c+='!@#$%^&*()-_=+[]{}|;:,.<>?';
          if(!c){document.getElementById('pwOutput').textContent='请至少选择一种字符类型';return;}
          let p=''; for(let i=0;i<len;i++) p+=c[Math.floor(Math.random()*c.length)];
          document.getElementById('pwOutput').textContent=p;
          const s=document.getElementById('pwStr');
          s.innerHTML='';
          const checks=[{id:'pwUpper',l:'大写'},{id:'pwLower',l:'小写'},{id:'pwNum',l:'数字'},{id:'pwSym',l:'符号'}];
          checks.forEach(x=>{const el=document.getElementById(x.id);const span=document.createElement('span');span.className='tool-tag';span.textContent=x.l+(el.checked?'✓':'✗');span.style.color=el.checked?'var(--accent)':'var(--text3)';s.appendChild(span);});
        }
        genPwd();
      <\/script>
    `
  },
  {
    id: 2, name: "二维码生成器", icon: "📱", iconBg: "linear-gradient(135deg,#00b8ff,#0066cc)",
    cat:"dev", catLabel:"开发", catColor:"var(--accent2)",
    desc: "输入文字或网址，一键生成高清二维码图片，可自定义尺寸和前背景色。",
    content: `
      <div class="t-input-group">
        <input class="t-input" id="qrInput" placeholder="输入文字或网址...">
        <button class="t-btn" onclick="genQR()">生成</button>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="t-label">尺寸</span>
          <input type="range" class="t-slider" id="qrSize" min="128" max="512" step="64" value="256" style="width:120px">
          <span class="t-slider-val" id="qrSizeVal">256px</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="t-label">前景</span>
          <input type="color" id="qrFg" value="#00e5a0" style="width:36px;height:32px;border:none;cursor:pointer;border-radius:6px;background:var(--bg3)">
        </div>

        const unitDefs={
          len:{units:['米(m)','千米(km)','厘米(cm)','毫米(mm)','英里(mi)','英尺(ft)','英寸(in)','码(yd)'],factors:[1,1000,0.01,0.001,1609.344,0.3048,0.0254,0.9144]},
          weight:{units:['千克(kg)','克(g)','毫克(mg)','吨(t)','磅(lb)','盎司(oz)'],factors:[1,0.001,0.000001,1000,0.453592,0.0283495]},

          area:{units:['平方米(m²)','平方千米(km²)','公顷(ha)','英亩(acre)','平方英尺(sq ft)'],factors:[1,1000000,10000,4046.86,0.092903]},

        };
        let currentUnitCat='len';

          const def=unitDefs[currentUnitCat],fEl=document.getElementById('unitFrom'),tEl=document.getElementById('unitTo');

        }
        buildUnitSelects();
      <\/script>

          hex=hex.trim();
          if(!/^#?[0-9a-fA-F]{6}$/.test(hex))return;
          if(hex[0]!=='#')hex='#'+hex;
          document.getElementById('colorPicker').value=hex;
          updateColor(hex);
        }
        document.getElementById('colorPicker').oninput=function(){const v=this.value;document.getElementById('colorHex').value=v;updateColor(v);}
        function updateColor(hex){
          document.getElementById('colorPreview').style.background=hex;
          const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
          const hsl=rgbToHsl(r,g,b);
          const hsv=rgbToHsv(r,g,b);
          const cmyk=rgbToCmyk(r,g,b);
          document.getElementById('fmtHex').textContent=hex.toUpperCase();
          document.getElementById('fmtRGB').textContent='RGB('+r+','+g+','+b+')';
          document.getElementById('fmtHSL').textContent='HSL('+hsl.h+','+hsl.s+'%,'+hsl.l+'%)';
          document.getElementById('fmtHSV').textContent='HSV('+hsv.h+'°,'+hsv.s+'%,'+hsv.v+'%)';
          document.getElementById('fmtCMYK').textContent='CMYK('+cmyk.c+'%,'+cmyk.m+'%,'+cmyk.y+'%,'+cmyk.k+'%)';
          ['Hex','RGB','HSL','HSV','CMYK'].forEach(f=>document.getElementById('swatch'+f).style.background=hex);
        }
        function rgbToHsl(r,g,b){r/=255;g/=255;b/=255;const max=Math.max(r,g,b),min=Math.min(r,g,b);let h,s,l=(max+min)/2;if(max===min){h=s=0;}else{const d=max-min;s=l>.5?d/(2-max-min):d/(max+min);switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;default:h=((r-g)/d+4)/6;break;}}return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};}
        function rgbToHsv(r,g,b){r/=255;g/=255;b/=255;const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;let h,s,v=max;s=max===0?0:d/max;if(max===min){h=0;}else{switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;default:h=((r-g)/d+4)/6;break;}}return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(v*100)};}
        function rgbToCmyk(r,g,b){if(r===0&&g===0&&b===0)return{h:'—',s:'—',l:'—'};const c=1-r/255,m=1-g/255,y=1-b/255,k=Math.min(c,m,y);return{c:Math.round((c-k)/(1-k)*100),m:Math.round((m-k)/(1-k)*100),y:Math.round((y-k)/(1-k)*100),k:Math.round(k*100)};}
      <\/script>
    `
  }
];

// ─────────────────────────────────────────
//  渲染
// ─────────────────────────────────────────
function renderTools(filter='all', query=''){
  const grid=document.getElementById('toolsGrid');
  const empty=document.getElementById('emptyState');
  const filtered=tools.filter(t=>{
    const mf=filter==='all'||t.cat===filter;
    const mq=query===''||t.name.includes(query)||t.desc.includes(query);
    return mf&&mq;
  });
  grid.innerHTML='';
  empty.classList.toggle('visible',filtered.length===0);
  filtered.forEach(tool=>{
    const card=document.createElement('div');
    card.className='tool-card';
    card.dataset.id=tool.id;
    card.innerHTML=`
      <div class="tool-top">
        <div class="tool-icon" style="background:${tool.iconBg}">${tool.icon}</div>
        <span class="tool-cat" style="background:${tool.catColor}20;color:${tool.catColor};border:1px solid ${tool.catColor}40">${tool.catLabel}</span>
      </div>
      <div class="tool-nm">${tool.name}</div>
      <div class="tool-desc">${tool.desc}</div>
      <div class="tool-footer">
        <div class="tool-tags"><span class="tool-tag">原创</span><span class="tool-tag">本地</span></div>
        <button class="open-btn" onclick="event.stopPropagation();togglePanel(${tool.id})">打开 →</button>
      </div>
      <div class="tool-panel" id="panel-${tool.id}">
        <div class="panel-close"><button class="panel-close-btn" onclick="closePanel(${tool.id})">收起 ↑</button></div>
        ${tool.content}
      </div>
    `;
    card.addEventListener('click',()=>togglePanel(tool.id));
    grid.appendChild(card);
  });
}

function togglePanel(id){
  const panel=document.getElementById('panel-'+id);
  const isOpen=panel.classList.contains('open');
  document.querySelectorAll('.tool-panel').forEach(p=>p.classList.remove('open'));
  if(!isOpen)panel.classList.add('open');
}
function closePanel(id){document.getElementById('panel-'+id).classList.remove('open');}

function copyText(text){
  navigator.clipboard.writeText(text).then(()=>{
    const el=document.activeElement;
    const orig=el.textContent||el.value;
    el.textContent='已复制 ✓';
    setTimeout(()=>{if(el.textContent==='已复制 ✓')el.textContent=orig;},1500);
  });
}

// Filter
document.querySelectorAll('.fbtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderTools(btn.dataset.f, document.getElementById('searchInput').value);
  });
});
document.getElementById('searchInput').addEventListener('input',e=>{
  renderTools(document.querySelector('.fbtn.active').dataset.f, e.target.value);
});

renderTools();
</script>
