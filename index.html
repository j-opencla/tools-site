<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工具箱 · ToolsHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #C7EDCC; --bg2: #D4F0D4; --bg3: #E8F5E9; --bg4: #B8E0BE;
  --border: #8CC98C; --text: #1B3A1B; --text2: #3D6B3D; --text3: #6B9B6B;
  --accent: #2E7D32; --accent2: #00897B;
  --radius: 12px; --radius2: 20px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
  display: flex; flex-direction: column;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

body::after {
  content: ''; position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(46,125,50,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(46,125,50,0.04) 1px, transparent 1px);
  background-size: 60px 60px; pointer-events: none; z-index: 0;
}

header {
  position: relative; z-index: 10;
  padding: 56px 40px 44px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(46,125,50,0.05) 0%, transparent 100%);
}
.logo-bar {
  display: flex; align-items: center; gap: 10px;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  letter-spacing: 3px; text-transform: uppercase; color: var(--accent);
  margin-bottom: 16px;
}
.logo-bar::before {
  content: ''; width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); display: inline-block;
  box-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

h1 { font-size: clamp(32px,5vw,58px); font-weight:800; letter-spacing:-2px; line-height:1.1; margin-bottom:12px; }
.gradient-text {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header-desc { font-size:14px; color:var(--text2); max-width:520px; line-height:1.7; }

main {
  position: relative; z-index: 10;
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 60px 40px;
}

.coming-soon {
  text-align: center; max-width: 480px;
}
.coming-soon .icon {
  font-size: 64px; margin-bottom: 24px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

.coming-soon h2 {
  font-size: 28px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px;
}
.coming-soon p {
  font-size: 14px; color: var(--text2); line-height: 1.8; margin-bottom: 8px;
}
.coming-soon .hint {
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--text3); margin-top: 24px; letter-spacing: 1px;
}

footer {
  position: relative; z-index: 10; text-align: center;
  padding: 36px; color: var(--text3); font-size: 11px;
  border-top: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace; letter-spacing: 1px;
}

@media(max-width:640px){
  header{padding:32px 20px 28px}
  main{padding:40px 20px}
  .coming-soon .icon{font-size:48px}
  .coming-soon h2{font-size:22px}
}
</style>
</head>
<body>

<header>
  <div class="logo-bar">TOOLS HUB · 原创效率工具</div>
  <h1>原创<span class="gradient-text">效率工具箱</span></h1>
  <p class="header-desc">精心打造的原创在线工具，覆盖开发、效率、转换等场景。正在重构中，敬请期待。</p>
</header>

<main>
  <div class="coming-soon">
    <div class="icon">🛠️</div>
    <h2>工具重构中</h2>
    <p>所有工具正在重新打磨，<br>修复完毕后会逐一上线。</p>
    <p>感谢你的耐心 🙏</p>
    <div class="hint">// COMING BACK SOON</div>
  </div>
</main>

<footer>TOOLS HUB · 原创工具</footer>

</body>
</html>
